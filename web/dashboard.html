<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniAuth Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background-color: #f0f2f5; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-width: 600px; margin: 0 auto; }
        h2 { color: #333; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
        button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #c82333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Dashboard</h2>
        <p>Welcome! Here is your permission mask for app 'crm':</p>
        <pre id="maskData">Loading...</pre>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        async function fetchMask() {
            try {
                const response = await fetch('/api/v1/auth/my-mask?app_code=crm');
                if (response.status === 401) {
                    window.location.href = '/'; // Redirect to login
                    return;
                }
                const data = await response.json();
                document.getElementById('maskData').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('maskData').textContent = 'Error fetching data';
            }
        }

        async function logout() {
            await fetch('/api/v1/auth/logout', { method: 'POST' });
            window.location.href = '/';
        }

        fetchMask();
    </script>
</body>
</html>
